name: Process Audio (YouTube/TikTok/SoundCloud/Upload)

on:
  workflow_dispatch:
    inputs:
      source_type:
        description: 'Source type (youtube/tiktok/soundcloud/mp3)'
        required: true
        type: choice
        options:
          - youtube
          - tiktok
          - soundcloud
          - mp3
      url:
        description: 'URL (untuk YouTube/TikTok/SoundCloud)'
        required: false
        type: string
      mp3_file_url:
        description: 'Direct file URL (untuk source_type=mp3, support *.mp3/ogg/wav/flac)'
        required: false
        type: string
      input_format:
        description: 'Format file input upload (mp3/ogg/wav/flac) — hanya berlaku jika source_type=mp3'
        required: false
        default: 'mp3'
        type: choice
        options:
          - mp3
          - ogg
          - wav
          - flac
      file_title:
        description: 'Judul file audio yang diupload'
        required: false
        default: 'uploaded_audio'
        type: string
      cookies:
        description: 'YouTube cookies (format Netscape) — opsional'
        required: false
        type: string
      speed:
        description: 'Kecepatan putar (0.5–5.0)'
        required: false
        default: '2.3'
        type: string
      amplify:
        description: 'Amplifikasi volume dalam dB (-20 sampai 20)'
        required: false
        default: '-4'
        type: string
      max_duration:
        description: 'Durasi maksimum per bagian (detik) — dipakai saat auto_cut=true'
        required: false
        default: '360'
        type: string
      output_format:
        description: 'Format output (mp3/ogg/flac/wav)'
        required: false  # 🔥 FIX: required:0 → required: false
        default: 'ogg'
        type: choice
        options:
          - ogg
          - mp3
          - flac
          - wav
      auto_cut:
        description: 'Potong otomatis jika durasi melebihi max_duration (true/false)'
        required: false
        default: 'true'
        type: string
      job_id:
        description: 'Job ID dari web (wajib diisi)'
        required: true
        type: string
      callback_url:
        description: 'Webhook callback URL (wajib diisi)'
        required: true
        type: string

jobs:
  process-audio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-yt-dlp
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install yt-dlp
          sudo apt-get install -y bc jq

      - name: Create temp directory
        run: mkdir -p temp

      # ===================================================================
      # DOWNLOAD — YouTube
      # ===================================================================
      - name: Download from YouTube
        if: inputs.source_type == 'youtube'
        id: download_youtube
        run: |
          cd temp
          echo "▶️ Downloading from YouTube: ${{ inputs.url }}"

          if [ -n "${{ inputs.cookies }}" ]; then
            echo "${{ inputs.cookies }}" > cookies.txt
            COOKIES_OPT="--cookies cookies.txt"
          else
            COOKIES_OPT=""
          fi

          yt-dlp $COOKIES_OPT \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --skip-download \
            --print-json \
            "${{ inputs.url }}" > info.json || {
              echo "❌ Gagal mengambil metadata YouTube"
              exit 1
            }

          TITLE=$(jq -r '.title' info.json)
          DURATION=$(jq -r '.duration' info.json)

          yt-dlp $COOKIES_OPT \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --extract-audio \
            --audio-format mp3 \
            --audio-quality 0 \
            --output "audio.%(ext)s" \
            "${{ inputs.url }}" || {
              echo "❌ Gagal download audio YouTube"
              exit 1
            }

          FILENAME="audio.mp3"
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "title=$TITLE"       >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          cd ..

      # ===================================================================
      # DOWNLOAD — TikTok
      # ===================================================================
      - name: Download from TikTok
        if: inputs.source_type == 'tiktok'
        id: download_tiktok
        run: |
          cd temp
          echo "▶️ Downloading from TikTok: ${{ inputs.url }}"

          yt-dlp \
            --user-agent "Mozilla/5.0" \
            --skip-download \
            --print-json \
            "${{ inputs.url }}" > info.json || {
              echo "❌ Gagal mengambil metadata TikTok"
              exit 1
            }

          TITLE=$(jq -r '.title' info.json)
          DURATION=$(jq -r '.duration' info.json)

          yt-dlp \
            --user-agent "Mozilla/5.0" \
            --extract-audio \
            --audio-format mp3 \
            --audio-quality 0 \
            --output "audio.%(ext)s" \
            "${{ inputs.url }}" || {
              echo "❌ Gagal download audio TikTok"
              exit 1
            }

          FILENAME="audio.mp3"
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "title=$TITLE"       >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          cd ..

      # ===================================================================
      # DOWNLOAD — SoundCloud
      # ===================================================================
      - name: Download from SoundCloud
        if: inputs.source_type == 'soundcloud'
        id: download_soundcloud
        run: |
          cd temp
          echo "▶️ Downloading from SoundCloud: ${{ inputs.url }}"

          yt-dlp \
            --user-agent "Mozilla/5.0" \
            --skip-download \
            --print-json \
            "${{ inputs.url }}" > info.json || {
              echo "❌ Gagal mengambil metadata SoundCloud"
              exit 1
            }

          TITLE=$(jq -r '.title' info.json)
          DURATION=$(jq -r '.duration' info.json)

          yt-dlp \
            --user-agent "Mozilla/5.0" \
            --extract-audio \
            --audio-format mp3 \
            --audio-quality 0 \
            --output "audio.%(ext)s" \
            "${{ inputs.url }}" || {
              echo "❌ Gagal download audio SoundCloud"
              exit 1
            }

          FILENAME="audio.mp3"
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "title=$TITLE"       >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          cd ..

      # ===================================================================
      # DOWNLOAD — Direct Upload
      # ===================================================================
      - name: Download audio from direct URL
        if: inputs.source_type == 'mp3'
        id: download_mp3
        run: |
          cd temp
          INPUT_FORMAT="${{ inputs.input_format }}"
          INPUT_FILE="input.${INPUT_FORMAT}"
          echo "⬇️ Downloading audio (${INPUT_FORMAT}): ${{ inputs.mp3_file_url }}"

          HTTP_STATUS=$(curl -L \
            --retry 3 \
            --max-time 300 \
            -w "%{http_code}" \
            -o "$INPUT_FILE" \
            "${{ inputs.mp3_file_url }}")

          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Download gagal dengan HTTP status $HTTP_STATUS"
            exit 1
          fi

          FILE_SIZE=$(stat -c%s "$INPUT_FILE")
          echo "Ukuran file: $FILE_SIZE bytes"
          file "$INPUT_FILE"

          if ! ffprobe -v error -i "$INPUT_FILE" 2>/dev/null; then
            echo "❌ File bukan audio yang valid"
            exit 1
          fi

          DURATION=$(ffprobe -v error \
            -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 \
            "$INPUT_FILE" 2>/dev/null || echo "0")

          echo "Durasi: $DURATION detik"
          echo "filename=$INPUT_FILE"             >> $GITHUB_OUTPUT
          echo "title=${{ inputs.file_title }}"   >> $GITHUB_OUTPUT
          echo "duration=$DURATION"               >> $GITHUB_OUTPUT
          cd ..

      # ===================================================================
      # PROCESS AUDIO dengan FFmpeg
      # ===================================================================
      - name: Process Audio with FFmpeg
        id: process
        run: |
          cd temp

          case "${{ inputs.source_type }}" in
            youtube)    INPUT_FILE="${{ steps.download_youtube.outputs.filename }}"; TITLE="${{ steps.download_youtube.outputs.title }}"; TOTAL_DURATION="${{ steps.download_youtube.outputs.duration }}" ;;
            tiktok)     INPUT_FILE="${{ steps.download_tiktok.outputs.filename }}"; TITLE="${{ steps.download_tiktok.outputs.title }}"; TOTAL_DURATION="${{ steps.download_tiktok.outputs.duration }}" ;;
            soundcloud) INPUT_FILE="${{ steps.download_soundcloud.outputs.filename }}"; TITLE="${{ steps.download_soundcloud.outputs.title }}"; TOTAL_DURATION="${{ steps.download_soundcloud.outputs.duration }}" ;;
            mp3)        INPUT_FILE="${{ steps.download_mp3.outputs.filename }}"; TITLE="${{ steps.download_mp3.outputs.title }}"; TOTAL_DURATION="${{ steps.download_mp3.outputs.duration }}" ;;
          esac

          echo "📂 Input  : $INPUT_FILE"
          echo "🎵 Title  : $TITLE"
          echo "⏱ Durasi : ${TOTAL_DURATION}s"

          if [ ! -f "$INPUT_FILE" ]; then
            echo "❌ Input file tidak ditemukan: $INPUT_FILE"
            exit 1
          fi

          OUTPUT_FORMAT="${{ inputs.output_format }}"
          case "$OUTPUT_FORMAT" in
            mp3)  CODEC="-c:a libmp3lame -q:a 2" ; EXT="mp3"  ; FORMAT="mp3"  ; EXTRA_OPTS="" ;;
            flac) CODEC="-c:a flac"               ; EXT="flac" ; FORMAT="flac" ; EXTRA_OPTS="" ;;
            wav)  CODEC="-c:a pcm_s16le"          ; EXT="wav"  ; FORMAT="wav"  ; EXTRA_OPTS="" ;;
            ogg|*) CODEC="-c:a libvorbis -b:a 128k"; EXT="ogg"  ; FORMAT="ogg"  ; EXTRA_OPTS="-ar 44100 -ac 2" ;;
          esac
          
          echo "🎚 Output format: $OUTPUT_FORMAT, extension: .$EXT"

          SPEED="${{ inputs.speed }}"
          build_atempo() {
            local spd="$1"
            local filters=""
            while (( $(echo "$spd > 2.0" | bc -l) )); do
              filters="${filters}atempo=2.0,"
              spd=$(echo "scale=6; $spd / 2.0" | bc -l)
            done
            while (( $(echo "$spd < 0.5" | bc -l) )); do
              filters="${filters}atempo=0.5,"
              spd=$(echo "scale=6; $spd / 0.5" | bc -l)
            done
            spd=$(printf "%.6f" "$spd")
            filters="${filters}atempo=${spd}"
            echo "$filters"
          }

          SPEED_FILTER=$(build_atempo "$SPEED")
          AMPLIFY="${{ inputs.amplify }}"
          VOLUME=$(echo "scale=6; e(l(10)*${AMPLIFY}/20)" | bc -l)
          AUDIO_FILTER="${SPEED_FILTER},volume=${VOLUME}"
          ADJUSTED_DURATION=$(echo "scale=3; $TOTAL_DURATION / $SPEED" | bc -l)
          
          echo "📏 Durasi setelah speed: ${ADJUSTED_DURATION}s"
          MAX_DURATION="${{ inputs.max_duration }}"
          AUTO_CUT="${{ inputs.auto_cut }}"

          if [ "$AUTO_CUT" == "true" ] && (( $(echo "$ADJUSTED_DURATION > $MAX_DURATION" | bc -l) )); then
            PARTS=$(echo "scale=0; ($ADJUSTED_DURATION + $MAX_DURATION - 1) / $MAX_DURATION" | bc)
            PARTS=$(printf '%d' "$PARTS")
            PART_OUT_DURATION=$(echo "scale=3; $ADJUSTED_DURATION / $PARTS" | bc -l)
            PART_IN_DURATION=$(echo "scale=3; $PART_OUT_DURATION * $SPEED" | bc -l)

            echo "✂️ Auto cut: ${PARTS} bagian × ${PART_OUT_DURATION}s"
            echo "parts=$PARTS" >> $GITHUB_OUTPUT
            echo "part_duration=$PART_OUT_DURATION" >> $GITHUB_OUTPUT

            for (( i=0; i<PARTS; i++ )); do
              START_IN=$(echo "scale=3; $i * $PART_IN_DURATION" | bc -l)
              OUTPUT_FILE="part_${i}_${{ inputs.job_id }}.${EXT}"
              echo "🔧 Memproses bagian $((i+1))/${PARTS}"

              ffmpeg -y -i "$INPUT_FILE" -ss "$START_IN" -t "$PART_IN_DURATION" \
                -filter:a "$AUDIO_FILTER" $CODEC $EXTRA_OPTS -f "$FORMAT" \
                -loglevel error \  # <-- TAMBAHKAN INI
                "$OUTPUT_FILE" 2>> ffmpeg-error.log || {
                    echo "❌ FFmpeg gagal di bagian $i"
                    cat ffmpeg-error.log
                    exit 1
                }

              PART_REAL_DUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$OUTPUT_FILE" 2>/dev/null || echo "0")
              PART_SIZE=$(stat -c%s "$OUTPUT_FILE")
              echo "✅ Bagian $((i+1))/${PARTS}: durasi=${PART_REAL_DUR}s, ukuran=${PART_SIZE} bytes"
            done
          else
            PARTS=1
            OUTPUT_FILE="part_0_${{ inputs.job_id }}.${EXT}"
            echo "🔧 Memproses single file..."

            ffmpeg -y -i "$INPUT_FILE" -filter:a "$AUDIO_FILTER" $CODEC $EXTRA_OPTS -f "$FORMAT" \
              "$OUTPUT_FILE" 2>> ffmpeg-error.log || {
                echo "❌ FFmpeg gagal"
                cat ffmpeg-error.log
                exit 1
              }

            REAL_DUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$OUTPUT_FILE" 2>/dev/null || echo "0")
            FILE_SIZE=$(stat -c%s "$OUTPUT_FILE")
            echo "✅ Single file: durasi=${REAL_DUR}s, ukuran=${FILE_SIZE} bytes"
            echo "parts=1" >> $GITHUB_OUTPUT
            echo "part_duration=$REAL_DUR" >> $GITHUB_OUTPUT
          fi

          echo "ext=$EXT" >> $GITHUB_OUTPUT
          cd ..

      # ===================================================================
      # UPLOAD semua bagian ke webhook callback (SEQUENTIAL - STABIL)
      # ===================================================================
      - name: Upload parts to webhook
        run: |
          cd temp

          case "${{ inputs.source_type }}" in
            youtube)    TITLE="${{ steps.download_youtube.outputs.title }}"   ;;
            tiktok)     TITLE="${{ steps.download_tiktok.outputs.title }}"    ;;
            soundcloud) TITLE="${{ steps.download_soundcloud.outputs.title }}";;
            mp3)        TITLE="${{ steps.download_mp3.outputs.title }}"       ;;
          esac

          PARTS="${{ steps.process.outputs.parts }}"
          EXT="${{ steps.process.outputs.ext }}"
          echo "📤 Mengirim $PARTS bagian ke: ${{ inputs.callback_url }}"

          FAILED_PARTS=0

          for (( i=0; i<PARTS; i++ )); do
            OUTPUT_FILE="part_${i}_${{ inputs.job_id }}.${EXT}"

            if [ ! -f "$OUTPUT_FILE" ]; then
              echo "❌ File tidak ditemukan: $OUTPUT_FILE"
              FAILED_PARTS=$((FAILED_PARTS + 1))
              continue
            fi

            PART_DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$OUTPUT_FILE" 2>/dev/null || echo "0")
            PART_SIZE=$(stat -c%s "$OUTPUT_FILE")

            echo "📤 Mengirim bagian $((i+1))/${PARTS}: $OUTPUT_FILE (${PART_DURATION}s, ${PART_SIZE} bytes)"

            UPLOAD_SUCCESS=false
            for attempt in 1 2 3; do
              HTTP_RESP=$(curl -s -o /tmp/callback_response.json -w "%{http_code}" \
                --max-time 60 \
                --connect-timeout 10 \
                -X POST "${{ inputs.callback_url }}" \
                -F "job_id=${{ inputs.job_id }}" \
                -F "audio_file=@${OUTPUT_FILE}" \
                -F "title=${TITLE}" \
                -F "source_type=${{ inputs.source_type }}" \
                -F "duration=${PART_DURATION}" \
                -F "part_index=${i}" \
                -F "total_parts=${PARTS}" \
                -F "file_size=${PART_SIZE}" \
                -F "format=${EXT}" \
                -F "settings_speed=${{ inputs.speed }}" \
                -F "settings_amplify=${{ inputs.amplify }}" \
                -F "settings_max_duration=${{ inputs.max_duration }}" \
                -F "settings_auto_cut=${{ inputs.auto_cut }}")

              echo "   Part $((i+1)) Attempt $attempt — HTTP $HTTP_RESP"
              
              if [[ "$HTTP_RESP" =~ ^2[0-9][0-9]$ ]]; then
                echo "✅ Part $((i+1)) berhasil (HTTP $HTTP_RESP)"
                UPLOAD_SUCCESS=true
                break
              elif [ "$attempt" -lt 3 ]; then
                echo "⚠️ Retry dalam 5 detik..."
                sleep 5
              fi
            done
            
            if [ "$UPLOAD_SUCCESS" = false ]; then
              echo "❌ Part $((i+1)) gagal setelah 3 percobaan"
              FAILED_PARTS=$((FAILED_PARTS + 1))
            fi
          done

          if [ "$FAILED_PARTS" -gt 0 ]; then
            echo "❌ $FAILED_PARTS dari $PARTS bagian gagal dikirim"
            
            curl -s -X POST "${{ inputs.callback_url }}" \
              --max-time 10 \
              --connect-timeout 5 \
              -F "job_id=${{ inputs.job_id }}" \
              -F "workflow_status=failed" \
              -F "error_message=Gagal upload $FAILED_PARTS dari $PARTS bagian" \
              -F "failed_parts=$FAILED_PARTS" \
              -F "total_parts=$PARTS" \
              || true
            
            exit 1
          fi
          
          echo "✅ Semua $PARTS bagian berhasil dikirim"
          cd ..

      # ===================================================================
      # Failure Callback
      # ===================================================================
      - name: Send failure callback
        if: failure()
        run: |
          echo "❌ Workflow gagal, mengirim failure callback..."
          
          ERROR_MSG="Workflow gagal pada step: ${{ github.job }}"
          
          if [ -f temp/ffmpeg-error.log ]; then
            ERROR_MSG=$(cat temp/ffmpeg-error.log | tail -5 | tr '\n' ' ')
          fi
          
          curl -s -X POST "${{ inputs.callback_url }}" \
            --max-time 10 \
            --connect-timeout 5 \
            -F "job_id=${{ inputs.job_id }}" \
            -F "workflow_status=failed" \
            -F "error_message=${ERROR_MSG}" \
            -F "github_run_id=${{ github.run_id }}" \
            || true
          
          echo "📤 Failure callback terkirim"

      # ===================================================================
      # Upload error logs
      # ===================================================================
      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-${{ inputs.job_id }}
          path: |
            temp/ffmpeg-error.log
            temp/info.json
            /tmp/callback_response.json

      # ===================================================================
      # Cleanup
      # ===================================================================
      - name: Cleanup temp
        if: always()
        run: rm -rf temp/ /tmp/callback_response.json